name: wisp
description: "Modern File Manager"
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.20.2
  dartx: ^1.2.0
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_riverpod: ^3.2.1
  animations: ^2.2.0
  window_manager: ^0.4.3

  xdg_mime:
    git:
      url: https://github.com/ross96D/xdg-mime.dart

  from_zero_ui:
    # path: ../from_zero_ui/
    git:
      url: https://github.com/FromZeroDev/from_zero_ui
      ref: riverpod3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  intl: ^0.20.2
  archive: ^4.0.7

flutter:
  uses-material-design: true
